<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeSGS</title>
    <meta
      name="description"
      content="WeSGS starter project with a polished static web experience."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero__content">
          <p class="eyebrow">Starter Workspace</p>
          <h1 id="page-title">WeSGS</h1>
          <p class="lede">
            一个干净、快速、可直接扩展的静态项目起点。
          </p>
          <div class="actions" aria-label="Project actions">
            <a class="button button--primary" href="#overview">查看项目</a>
            <a class="button button--ghost" href="README.md">阅读 README</a>
          </div>
        </div>
        <div class="status-panel" aria-label="Project status">
          <div class="status-panel__header">
            <span class="pulse" aria-hidden="true"></span>
            <span>Ready</span>
          </div>
          <dl>
            <div>
              <dt>Type</dt>
              <dd>Static Web</dd>
            </div>
            <div>
              <dt>Stack</dt>
              <dd>HTML / CSS / JS</dd>
            </div>
            <div>
              <dt>Next</dt>
              <dd>Build features</dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="overview" id="overview" aria-label="Project overview">
        <article>
          <h2>清晰结构</h2>
          <p>入口、样式和交互分离，方便后续接入框架或继续扩展页面。</p>
        </article>
        <article>
          <h2>无需构建</h2>
          <p>直接打开 <code>index.html</code> 即可预览，也可以部署到任意静态托管平台。</p>
        </article>
        <article>
          <h2>已准备提交</h2>
          <p>项目包含基础文档和 Git 忽略规则，适合作为远程仓库第一版。</p>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
